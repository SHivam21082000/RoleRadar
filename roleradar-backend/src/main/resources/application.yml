server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: roleradar

  # ── Database ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roleradar}
    username: ${DB_USER:roleradar}
    password: ${DB_PASSWORD:roleradar_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ──
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ── File Upload ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── JWT ──
app:
  jwt:
    secret: ${JWT_SECRET:roleradar-dev-secret-key-change-in-production-minimum-256-bits-long}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days

  # ── MinIO ──
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket-name: ${MINIO_BUCKET:roleradar-resumes}

  # ── OpenAI ──
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

  # ── CORS ──
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ── Logging ──
logging:
  level:
    com.roleradar: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ── Swagger ──
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
